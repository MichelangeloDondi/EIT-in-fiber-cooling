name: consistency
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      # Fast gate: SSOT self-consistency, engine-constant cross-check (regex
      # fallback if qutip is absent), and the stale-value scan. No heavy solve.
      - name: consistency gate
        run: python3 audit/check.py
